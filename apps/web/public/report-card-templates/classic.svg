  <rect x="10" y="188" width="96" height="46" rx="2" fill="none" stroke="#1a5c1a" stroke-width="1.5"/>
  <rect x="112" y="188" width="44" height="46" rx="2" fill="none" stroke="#1a5c1a" stroke-width="1.5"/>
  <rect x="162" y="188" width="48" height="46" rx="2" fill="none" stroke="#1a5c1a" stroke-width="1.5"/>
