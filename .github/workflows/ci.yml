name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        # Fail only on CRITICAL. Remaining HIGH issues (next 14→16, @typescript-eslint 6→8)
        # require major version upgrades tracked in the ops roadmap.
        run: npm audit --audit-level=critical

      - name: Lint (web + api)
        run: npm run lint

      - name: Type check — web
        run: npx tsc --project apps/web/tsconfig.json --noEmit

      - name: Type check — api
        run: npx tsc --project apps/api/tsconfig.json --noEmit

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # Railway auto-deploys via GitHub integration — no webhook step needed.
  # Enable "Wait for CI checks" in Railway → service → Settings → Source
  # so Railway only deploys after this workflow passes.
