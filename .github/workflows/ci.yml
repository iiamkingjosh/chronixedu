name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        # Fail only on CRITICAL. Remaining HIGH issues (next 14→16, @typescript-eslint 6→8)
        # require major version upgrades tracked in the ops roadmap.
        run: npm audit --audit-level=critical

      - name: Lint (web + api)
        run: npm run lint

      - name: Type check — web
        run: npx tsc --project apps/web/tsconfig.json --noEmit

      - name: Type check — api
        run: npx tsc --project apps/api/tsconfig.json --noEmit

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    env:
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Deliberately scoped to apps/api/src/__tests__ only — this suite mocks
      # pg/Supabase/SendGrid entirely, so it needs no real credentials and never
      # touches a live database. It deploy-gates Railway via "Wait for CI checks".
      #
      # apps/api/tests/** is a SEPARATE integration suite that runs against the
      # real production Supabase DB using hardcoded fixture UUIDs (e.g. a fixed
      # school_id). It is NOT run here on purpose: gating deploys on it meant
      # Railway skipped real deployments whenever that fixture data drifted in
      # production (manual cleanup, the db-wipe script, concurrent test runs,
      # etc.) — failures unrelated to the code being shipped. Run it manually
      # with `npm run test:isolation` against a disposable/staging DB, never
      # automatically against production.
      - name: Run unit tests
        run: npm run test:unit

  # Railway auto-deploys via GitHub integration — no webhook step needed.
  # Enable "Wait for CI checks" in Railway → service → Settings → Source
  # so Railway only deploys after this workflow passes.
